<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VISORA — Real-Time Object Detection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=2">
</head>
<body>

<div id="bg-glow"></div>

<nav>
    <div class="logo">VISORA<sup>™</sup></div>
</nav>

<div id="welcome-screen">
    <h1>VISORA</h1>
    <p class="tagline">See. Detect. Track.</p>
    <p class="description">
        "Visora transforms live video into intelligent insights through real-time object detection and tracking. Built for speed, precision, and seamless AI vision."
    </p>
    <button id="open-camera-btn" onclick="openCamera()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
        Open Camera
    </button>
</div>

<div id="camera-screen">
    <img id="video-feed" src="" alt="Live detection feed">
    <button id="exit-btn" onclick="closeCamera()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
</div>

<script>
    function openCamera() {
        document.getElementById('video-feed').src = '/video_feed';
        document.getElementById('camera-screen').classList.add('active');
    }

    function closeCamera() {
        document.getElementById('camera-screen').classList.remove('active');
        document.getElementById('video-feed').src = '';
        fetch('/stop');
    }
</script>

</body>
</html>
